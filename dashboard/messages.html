<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Maid To Clean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        :root { --tw-color-primary: #00c4b4; }
        .tail-container * { font-family: 'Poppins', system_ui, sans-serif; }
    </style>
</head>
<body class="tail-container">

    <div id="navbar"></div>
    
    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-semibold mb-8">📥 Your Messages & Notifications</h1>
        
        <div class="bg-amber-50 border border-amber-200 rounded-3xl p-6 mb-8">
            <p class="text-amber-800">You can no longer send messages through the website.<br>
            For any questions, changes, or special requests, please <a href="mailto:stephanie.maidtoclean@gmail.com" class="underline font-medium">email support</a>.</p>
        </div>

        <div id="inbox-list" class="space-y-6"></div>
    </div>

<script>
async function loadNavbar() {
    const res = await fetch('components/navbar.html'); // ⚠️ no leading slash
    const html = await res.text();
    document.getElementById('navbar').innerHTML = html;

    const btn = document.getElementById("hamburger-btn");
    const menu = document.getElementById("mobile-menu");

    if (btn && menu) {
        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    }
}

/* ===== SUPABASE ===== */
const SUPABASE_URL = 'https://iyeifutvbcumkrcykbcc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZWlmdXR2YmN1bWtyY3lrYmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjA0NjEsImV4cCI6MjA5MDg5NjQ2MX0.K6it1_bzqLxP150s3LVHXT1Jz54s9TTwGL-3818TSwM';

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ===== LOAD MESSAGES ===== */
async function loadMessages() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return window.location.href = 'index.html';

    const { data: messages } = await supabase
        .from('messages')
        .select('*')
        .eq('to_user', user.id)
        .order('created_at', { ascending: false });

    const container = document.getElementById('inbox-list');

    if (!messages || messages.length === 0) {
        container.innerHTML = `<p class="text-gray-400 text-center py-12">No notifications yet.</p>`;
        return;
    }

    messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = "bg-white rounded-3xl p-6 shadow";
        div.innerHTML = `
            <div class="flex justify-between text-xs text-gray-400 mb-2">
                <span>From: Maid To Clean</span>
                <span>${new Date(msg.created_at).toLocaleDateString()}</span>
            </div>
            <p class="text-gray-700">${msg.text}</p>
        `;
        container.appendChild(div);
    });
}

/* ===== INIT ===== */
window.addEventListener("DOMContentLoaded", async () => {
    await loadNavbar();   // 👈 ensures navbar exists first
    await loadMessages(); // 👈 then run page logic
});
</script>
</body>
</html>
