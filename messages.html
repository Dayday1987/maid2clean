</head>
<body class="tail-container">

    <!-- NAVBAR - Fully responsive with mobile hamburger -->
<nav class="bg-white border-b shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-10 h-10 bg-teal-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">🧼</div>
            <h1 class="text-3xl font-semibold text-gray-900">Maid 2 Clean</h1>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
            <a href="index.html" class="hover:text-teal-500">Home</a>
            <a href="book-now.html" class="hover:text-teal-500">Book Now</a>
            <a href="services.html" class="hover:text-teal-500">Services</a>
            <a href="dashboard.html" class="hover:text-teal-500">Dashboard</a>
            <a href="messages.html" class="hover:text-teal-500">Messages</a>
            <span id="admin-link" class="hidden">
                <a href="admin.html" class="px-5 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-3xl text-sm font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-shield-halved"></i> Admin
                </a>
            </span>
        </div>

        <!-- Mobile Hamburger -->
        <button onclick="toggleMobileMenu()" class="md:hidden text-3xl text-gray-700">

        <!-- Auth buttons -->

    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-t px-6 py-4">
        <a href="index.html" class="block py-3 text-sm font-medium">Home</a>
        <a href="book-now.html" class="block py-3 text-sm font-medium">Book Now</a>
        <a href="services.html" class="block py-3 text-sm font-medium">Services</a>
        <a href="dashboard.html" class="block py-3 text-sm font-medium">Dashboard</a>
        <a href="messages.html" class="block py-3 text-sm font-medium">Messages</a>
        <span id="mobile-admin-link" class="hidden">
            <a href="admin.html" class="block py-3 text-sm font-medium flex items-center gap-x-2">
                <i class="fa-solid fa-shield-halved"></i> Admin Dashboard

</nav>

    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-semibold mb-8">📥 Your Messages & Notifications</h1>
        
        <div class="bg-amber-50 border border-amber-200 rounded-3xl p-6 mb-8">
            <p class="text-amber-800">You can no longer send messages through the website.<br>
            For any questions, changes, or special requests, please <a href="mailto:stephanie.maidtoclean@gmail.com" class="underline font-medium">email support</a>.</p>
        </div>

        <div id="inbox-list" class="space-y-6"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iyeifutvbcumkrcykbcc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZWlmdXR2YmN1bWtyY3lrYmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjA0NjEsImV4cCI6MjA5MDg5NjQ2MX0.K6it1_bzqLxP150s3LVHXT1Jz54s9TTwGL-3818TSwM';

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadMessages() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            const { data: messages } = await supabase
                .from('messages')
                .select('*')
                .eq('to_user', user.id)
                .order('created_at', { ascending: false });

            const container = document.getElementById('inbox-list');

            if (!messages || messages.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-12">No notifications yet.</p>`;
                return;
            }

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl p-6 shadow";
                div.innerHTML = `
                    <div class="flex justify-between text-xs text-gray-400 mb-2">
                        <span>From: Maid To Clean</span>
                        <span>${new Date(msg.created_at).toLocaleDateString()}</span>
                    </div>
                    <p class="text-gray-700">${msg.text}</p>
                `;
                container.appendChild(div);
            });
        }

        window.onload = loadMessages;
    </script>
</body>
</html>
