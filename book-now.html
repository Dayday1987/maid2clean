<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Cleaning - Maid 2 Clean</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
.tail-container * { font-family: 'Poppins', system-ui, sans-serif; }
</style>
</head>

<body class="tail-container bg-gray-50">

<div id="navbar"></div>

<div class="max-w-6xl mx-auto px-6 py-12 grid md:grid-cols-2 gap-10">

<!-- LEFT SIDE (FORM) -->
<div class="bg-white p-8 rounded-3xl shadow space-y-6">

<h1 class="text-3xl font-semibold">Schedule Your Cleaning</h1>

<!-- SERVICE -->
<div>
<label class="block mb-2 font-medium">Service Type</label>
<select id="service" class="w-full border rounded-2xl p-4">
<option value="standard">Standard Cleaning</option>
<option value="deep">Deep Cleaning</option>
<option value="move">Move In/Out</option>
<option value="office">Office Cleaning</option>
<option value="commercial">Commercial Cleaning</option>
<option value="post">Post-Construction</option>
<option value="custom">Custom</option>
</select>
</div>

<!-- SQ FT -->
<div>
<label class="block mb-2 font-medium">Home Size (sq ft)</label>
<input id="sqft" type="number" placeholder="e.g. 1800" class="w-full border rounded-2xl p-4">
</div>

<!-- DATE -->
<div class="grid grid-cols-2 gap-4">
<input id="date" type="date" class="border rounded-2xl p-4">
<select id="time" class="border rounded-2xl p-4">
<option>9:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>1:00 PM</option>
<option>2:00 PM</option>
</select>
</div>

<!-- ADD-ONS -->
<div>
<label class="block mb-4 font-medium">Add-ons</label>

<div class="grid grid-cols-2 gap-3 text-sm">

<label><input type="checkbox" value="oven"> Oven (+$50)</label>
<label><input type="checkbox" value="fridge"> Fridge (+$50)</label>
<label><input type="checkbox" value="windows"> Windows (+$60)</label>
<label><input type="checkbox" value="laundry"> Laundry (+$30)</label>
<label><input type="checkbox" value="cabinets"> Cabinets (+$60)</label>
<label><input type="checkbox" value="baseboards"> Baseboards (+$40)</label>
<label><input type="checkbox" value="fans"> Ceiling Fans (+$25)</label>
<label><input type="checkbox" value="blinds"> Blinds (+$60)</label>

</div>
</div>

</div>

<!-- RIGHT SIDE (SUMMARY) -->
<div class="bg-white p-8 rounded-3xl shadow flex flex-col justify-between">

<div>
<h2 class="text-2xl font-semibold mb-6">Summary</h2>

<div class="space-y-3 text-gray-600">
<p>Service: <span id="summary-service"></span></p>
<p>Size: <span id="summary-size"></span></p>
<p>Add-ons: <span id="summary-addons"></span></p>
</div>

<hr class="my-6">

<div class="text-4xl font-semibold text-teal-500" id="total-price">$0</div>
</div>

<button onclick="continueToPayment()" class="mt-6 w-full py-4 bg-teal-500 text-white rounded-2xl text-lg font-semibold">
Continue to Payment →
</button>

</div>

</div>

<script>
const SERVICES = {
standard: { base: 120, rate: 0.10 },
deep: { base: 220, rate: 0.15 },
move: { base: 250, rate: 0.18 },
office: { rate: 0.12 },
commercial: { rate: 0.15 },
post: { rate: 0.25 },
custom: { base: 100 }
};

const ADDONS = {
oven: 50,
fridge: 50,
windows: 60,
laundry: 30,
cabinets: 60,
baseboards: 40,
fans: 25,
blinds: 60
};

function calculatePrice() {
const service = document.getElementById("service").value;
const sqft = parseInt(document.getElementById("sqft").value) || 0;

let price = 0;

if (SERVICES[service].base) {
price += SERVICES[service].base;
}

if (SERVICES[service].rate) {
price += sqft * SERVICES[service].rate;
}

// ADD-ONS
let addonTotal = 0;
let addonNames = [];

document.querySelectorAll("input[type=checkbox]:checked").forEach(cb => {
addonTotal += ADDONS[cb.value];
addonNames.push(cb.value);
});

price += addonTotal;

// UPDATE UI
document.getElementById("total-price").textContent = "$" + Math.round(price);
document.getElementById("summary-service").textContent = service;
document.getElementById("summary-size").textContent = sqft + " sq ft";
document.getElementById("summary-addons").textContent = addonNames.join(", ") || "None";
}

// EVENT LISTENERS
document.querySelectorAll("input, select").forEach(el => {
el.addEventListener("change", calculatePrice);
});

function continueToPayment() {
const data = {
service: document.getElementById("service").value,
sqft: document.getElementById("sqft").value,
date: document.getElementById("date").value,
time: document.getElementById("time").value,
price: document.getElementById("total-price").textContent
};

localStorage.setItem("bookingData", JSON.stringify(data));
window.location.href = "payments.html";
}

/* NAVBAR */
async function loadNavbar() {
const res = await fetch('/components/navbar.html');
const html = await res.text();
document.getElementById('navbar').innerHTML = html;

const btn = document.getElementById("hamburger-btn");
const menu = document.getElementById("mobile-menu");

if (btn && menu) {
btn.addEventListener("click", () => {
menu.classList.toggle("hidden");
});
}
}

window.addEventListener("DOMContentLoaded", loadNavbar);
</script>

</body>
</html>
