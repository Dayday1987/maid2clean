<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now - Maid To Clean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        :root { --tw-color-primary: #00c4b4; }
        .tail-container * { font-family: 'Poppins', system_ui, sans-serif; }
    </style>
</head>
<body class="tail-container">

    <!-- NAVBAR -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">🧼</div>
                <h1 class="text-3xl font-semibold text-gray-900">Maid To Clean</h1>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html">Home</a>
                <a href="book-now.html" class="text-teal-500 font-semibold">Book Now</a>
                <a href="services.html">Services</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="messages.html">Messages</a>
            </div>
            <div id="auth-buttons" class="flex items-center gap-x-3"></div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-6 py-12">
        <h1 class="text-5xl font-semibold text-center mb-2">Book Your Cleaning</h1>
        <p class="text-center text-gray-500 mb-10">Secure booking powered by Stripe • Takes 60 seconds</p>

        <div class="bg-white rounded-3xl shadow-xl p-10">
            <!-- Guest / Logged-in notice -->
            <div id="user-status" class="mb-8 p-4 rounded-3xl bg-teal-50 text-teal-700 text-sm flex items-center gap-x-3"></div>

            <!-- Booking Form -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Service -->
                <div class="col-span-2">
                    <label class="block text-sm font-medium mb-2">Service Type</label>
                    <select id="service-type" class="w-full border rounded-3xl px-6 py-4 text-lg">
                        <option value="Residential Cleaning">Residential Cleaning — $129</option>
                        <option value="Deep Cleaning">Deep Cleaning — $249</option>
                        <option value="Office / Commercial">Office / Commercial — $199</option>
                        <option value="Move In / Move Out">Move In / Move Out — $279</option>
                    </select>
                </div>

                <!-- Date & Time -->
                <div>
                    <label class="block text-sm font-medium mb-2">Date</label>
                    <input id="booking-date" type="date" class="w-full border rounded-3xl px-6 py-4">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Preferred Time</label>
                    <select id="booking-time" class="w-full border rounded-3xl px-6 py-4">
                        <option>8:00 AM</option><option>9:00 AM</option><option>10:00 AM</option>
                        <option>11:00 AM</option><option>12:00 PM</option><option>1:00 PM</option>
                        <option>2:00 PM</option><option>3:00 PM</option>
                    </select>
                </div>

                <!-- Address -->
                <div class="col-span-2">
                    <label class="block text-sm font-medium mb-2">Service Address</label>
                    <input id="address" type="text" placeholder="123 Main St, Montgomery, AL" class="w-full border rounded-3xl px-6 py-4">
                </div>

                <!-- Guest fields (shown only for guests) -->
                <div id="guest-fields" class="col-span-2 grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name</label>
                        <input id="guest-name" type="text" class="w-full border rounded-3xl px-6 py-4">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Email</label>
                        <input id="guest-email" type="email" class="w-full border rounded-3xl px-6 py-4">
                    </div>
                </div>

                <!-- Notes -->
                <div class="col-span-2">
                    <label class="block text-sm font-medium mb-2">Special Instructions / Notes</label>
                    <textarea id="notes" rows="3" class="w-full border rounded-3xl px-6 py-4" placeholder="Anything we should know?"></textarea>
                </div>
            </div>

            <!-- Payment Section -->
            <div class="mt-12">
                <h3 class="font-semibold mb-6">Payment • Powered by Stripe</h3>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="startPayment('apple_pay')" 
                            class="flex items-center justify-center gap-x-4 border-2 border-black rounded-3xl py-6 text-xl font-semibold hover:bg-black hover:text-white">
                        <i class="fa-brands fa-apple-pay text-4xl"></i> Pay with Apple Pay
                    </button>
                    <button onclick="startPayment('paypal')" 
                            class="flex items-center justify-center gap-x-4 border-2 border-[#003087] text-[#003087] rounded-3xl py-6 text-xl font-semibold hover:bg-[#003087] hover:text-white">
                        <i class="fa-brands fa-paypal text-4xl"></i> Pay with PayPal
                    </button>
                    <button onclick="showCardForm()" 
                            class="flex items-center justify-center gap-x-4 border-2 border-teal-500 text-teal-500 rounded-3xl py-6 text-xl font-semibold hover:bg-teal-500 hover:text-white">
                        <i class="fa-solid fa-credit-card text-3xl"></i> Pay with Card
                    </button>
                </div>

                <!-- Stripe Card Element -->
                <div id="card-container" class="hidden mt-8">
                    <div id="card-element" class="border rounded-3xl p-6 bg-gray-50"></div>
                    <button onclick="processCardPayment()" 
                            class="mt-6 w-full py-5 bg-teal-500 text-white text-xl font-semibold rounded-3xl">
                        Pay Securely • $<span id="total-amount">129</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" onclick="if(event.target.id==='success-modal')hideSuccessModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-10 text-center">
            <div class="text-6xl mb-6">🎉</div>
            <h2 class="text-3xl font-semibold mb-2">Booking Confirmed!</h2>
            <p id="success-message" class="text-gray-600 mb-8"></p>
            <a href="dashboard.html" id="dashboard-link" class="hidden block w-full py-4 bg-teal-500 text-white rounded-3xl font-semibold">Go to My Dashboard</a>
            <button onclick="hideSuccessModal()" class="mt-4 text-gray-400">Close</button>
        </div>
    </div>

    <script>
        // ====================== YOUR KEYS ======================
        const SUPABASE_URL = 'https://YOUR-PROJECT-REF.supabase.co';   // ← REPLACE
        const SUPABASE_ANON_KEY = 'eyJ...';                           // ← REPLACE
        const STRIPE_PUBLISHABLE_KEY = 'pk_test_XXXXXXXXXXXXXXXXXXXXXXXX'; // ← Replace with your real Stripe pk_test_ key

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
        let elements;
        let currentUser = null;
        let bookingAmount = 129;

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;

            const statusEl = document.getElementById('user-status');
            if (user) {
                statusEl.innerHTML = `✅ Logged in as <strong>${user.email}</strong> — your booking will be saved to your account`;
                document.getElementById('guest-fields').classList.add('hidden');
            } else {
                statusEl.innerHTML = `🔑 Booking as guest. You’ll receive confirmation by email.`;
            }

            renderAuthButtons();
        }

        function renderAuthButtons() {
            const container = document.getElementById('auth-buttons');
            container.innerHTML = currentUser 
                ? `<span class="text-sm font-medium">👋 ${currentUser.email}</span><button onclick="logout()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm">Logout</button>`
                : `<button onclick="window.location.href='index.html'" class="px-5 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-2xl text-sm font-semibold">Login / Sign Up</button>`;
        }

        function startPayment(method) {
            if (method === 'apple_pay' || method === 'paypal') {
                alert(`✅ ${method.toUpperCase()} selected!\n\n(In production this opens the real ${method} sheet.)\n\nDemo payment successful.`);
                completeBooking();
            }
        }

        function showCardForm() {
            document.getElementById('card-container').classList.remove('hidden');
            elements = stripe.elements();
            const card = elements.create('card');
            card.mount('#card-element');
        }

        async function processCardPayment() {
            // In a real app you would create a PaymentIntent on your backend.
            // For this demo we simulate success:
            alert('✅ Card payment successful (demo mode)');
            completeBooking();
        }

        async function completeBooking() {
            const serviceType = document.getElementById('service-type').value;
            const date = document.getElementById('booking-date').value;
            const time = document.getElementById('booking-time').value;
            const address = document.getElementById('address').value;
            const notes = document.getElementById('notes').value || '';

            let guestEmail = null;
            let guestName = null;

            if (!currentUser) {
                guestName = document.getElementById('guest-name').value || 'Guest';
                guestEmail = document.getElementById('guest-email').value;
                if (!guestEmail) return alert('Please enter your email for guest booking');
            }

            // Save to Supabase
            const { error } = await supabase.from('bookings').insert({
                user_id: currentUser ? currentUser.id : null,
                service_type: serviceType,
                date: date,
                time: time,
                amount: bookingAmount,
                address: address,
                notes: notes,
                guest_email: guestEmail,
                guest_name: guestName,
                status: 'confirmed'
            });

            if (error) {
                alert('Error saving booking: ' + error.message);
                return;
            }

            // Show success
            const modal = document.getElementById('success-modal');
            const msg = document.getElementById('success-message');
            const link = document.getElementById('dashboard-link');

            if (currentUser) {
                msg.textContent = `Your ${serviceType} on ${date} at ${time} has been booked and saved to your account.`;
                link.classList.remove('hidden');
            } else {
                msg.innerHTML = `Thank you!<br>Your booking is confirmed.<br>A confirmation was sent to <strong>${guestEmail}</strong>.<br><br>You can create an account later to track all your bookings.`;
                link.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideSuccessModal() {
            const modal = document.getElementById('success-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            // Redirect logged-in users to dashboard
            if (currentUser) window.location.href = 'dashboard.html';
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        window.onload = init;
    </script>
</body>
</html>
